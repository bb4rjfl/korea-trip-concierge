# Builds the linux/amd64 image with API keys injected from GitHub Secrets
# (encrypted — never committed) and pushes it to GitHub Container Registry.
#
# ⚠️ The resulting image contains the keys, so the ghcr package MUST stay PRIVATE.
# KC then deploys it via the "컨테이너 이미지" registration (ghcr.io + a read:packages PAT).
#
# Setup (one-time, in GitHub → Settings → Secrets and variables → Actions):
#   add repository secrets TOUR_API_KEY, BUS_API_KEY, TRANSIT_API_KEY, SUBWAY_API_KEY,
#   SEOUL_API_KEY, JEJU_API_KEY, NAVER_CLIENT_ID, NAVER_CLIENT_SECRET, FOURSQUARE_API_KEY
#   (VISITSEOUL_API_KEY, KAKAO_REST_API_KEY optional). Then run this workflow.
name: deploy-image

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ["src/**", "scripts/**", "package.json", "package-lock.json", "tsconfig.json", "Dockerfile", ".github/workflows/deploy-image.yml"]

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/korea-trip-concierge:latest
          provenance: false
          build-args: |
            TOUR_API_KEY=${{ secrets.TOUR_API_KEY }}
            BUS_API_KEY=${{ secrets.BUS_API_KEY }}
            TRANSIT_API_KEY=${{ secrets.TRANSIT_API_KEY }}
            SUBWAY_API_KEY=${{ secrets.SUBWAY_API_KEY }}
            SEOUL_API_KEY=${{ secrets.SEOUL_API_KEY }}
            JEJU_API_KEY=${{ secrets.JEJU_API_KEY }}
            NAVER_CLIENT_ID=${{ secrets.NAVER_CLIENT_ID }}
            NAVER_CLIENT_SECRET=${{ secrets.NAVER_CLIENT_SECRET }}
            FOURSQUARE_API_KEY=${{ secrets.FOURSQUARE_API_KEY }}
            VISITSEOUL_API_KEY=${{ secrets.VISITSEOUL_API_KEY }}
            KAKAO_REST_API_KEY=${{ secrets.KAKAO_REST_API_KEY }}
